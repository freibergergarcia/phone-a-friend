name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Get and validate project version
        id: version
        run: |
          ver=$(node -e "console.log(require('./package.json').version)")
          if ! [[ "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid package.json version: $ver"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Check version sync
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          plugin_ver=$(node -e "console.log(require('./.claude-plugin/plugin.json').version)")
          if [ "$VERSION" != "$plugin_ver" ]; then
            echo "::error::Version mismatch: package.json=$VERSION plugin.json=$plugin_ver"
            exit 1
          fi
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: |
          npm ci
          npm run build
          npm test
          npm run typecheck
      - name: Create release app token
        if: steps.check.outputs.exists == 'false'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "v$VERSION"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${RELEASE_TOKEN}" \
            push https://github.com/${{ github.repository }}.git "v$VERSION"
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          args=(--generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "v$VERSION" "${args[@]}"
